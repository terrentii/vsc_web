{% extends "base.html" %}
{% block title %}Регистрация — МЫС Web{% endblock %}

{% block content %}
<div class="centered-container">
    <h2>Регистрация</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="login">Логин</label>
            <input type="text" id="login" name="login" required minlength="3" maxlength="32" autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required minlength="4" autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="password2">Подтвердите пароль</label>
            <input type="password" id="password2" name="password2" required minlength="4" autocomplete="new-password">
        </div>
        <button class="btn btn-primary" type="submit">Зарегистрироваться</button>
    </form>

    <p style="margin-top: 12px; font-size: 12px; color: #666;">
        Уже есть аккаунт? <a href="{{ url_for('auth.login') }}">Войти</a>
    </p>
</div>
{% endblock %}
